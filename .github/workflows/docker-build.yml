name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      distro:
        description: 'Target distro (alpine/ubuntu/debian/almalinux/amazonlinux/fedora/all)'
        required: false
        default: 'alpine'

env:
  REGISTRY: docker.io
  IMAGE_NAME: autosre/nginx-lua
  NGINX_VERSION: "1.30.0"
  OPENSSL_VERSION: "4.0.0"

permissions:
  contents: read
  packages: write

jobs:
  build-alpine:
    name: Build Alpine (amd64)
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tpl symlink
        # BuildKit cannot COPY directories through symlinks; replace tpl->src symlink with a real copy
        run: |
          if [ -L tpl ]; then
            TARGET=$(readlink tpl)
            rm tpl
            cp -r "$TARGET" tpl
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.NGINX_VERSION }}-alpine-amd64
            type=raw,value=latest-alpine-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ env.NGINX_VERSION }}-alpine-amd64-

      - name: Build and push Alpine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARCH=amd64
            VER_NGINX=${{ env.NGINX_VERSION }}
            VER_OPENSSL=${{ env.OPENSSL_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-other-distros:
    name: Build ${{ matrix.distro }} (amd64)
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu
          - debian
          - almalinux
          - amazonlinux
          - fedora
    steps:
      - name: Check if this distro should be built
        id: check
        run: |
          BUILD=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && \
             [[ "${{ inputs.distro }}" != "all" ]] && \
             [[ "${{ inputs.distro }}" != "${{ matrix.distro }}" ]]; then
            BUILD=false
          fi
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.check.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Resolve tpl symlink
        if: steps.check.outputs.build == 'true'
        run: |
          if [ -L tpl ]; then
            TARGET=$(readlink tpl)
            rm tpl
            cp -r "$TARGET" tpl
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check.outputs.build == 'true' && github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Dockerfiles
        if: steps.check.outputs.build == 'true'
        run: |
          python3 bin/generate-dockerfiles.py || true

      - name: Extract Docker metadata
        if: steps.check.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.NGINX_VERSION }}-${{ matrix.distro }}-amd64
            type=sha,prefix=${{ env.NGINX_VERSION }}-${{ matrix.distro }}-amd64-

      - name: Build and push ${{ matrix.distro }} image
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Dockerfile.${{ matrix.distro }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARCH=amd64
            VER_NGINX=${{ env.NGINX_VERSION }}
            VER_OPENSSL=${{ env.OPENSSL_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-alpine, build-other-distros]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Build Summary ==="
          echo "Alpine:         ${{ needs.build-alpine.result }}"
          echo "Other distros:  ${{ needs.build-other-distros.result }}"
          if [[ "${{ needs.build-alpine.result }}" == "failure" ]]; then
            echo "Alpine build FAILED"
            exit 1
          fi
