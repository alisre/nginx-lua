name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      distro:
        description: 'Target distro (alpine/ubuntu/debian/almalinux/amazonlinux/fedora/all)'
        required: false
        default: 'alpine'
      push:
        description: 'Push to registry after build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  NGINX_VERSION: "1.30.0"
  OPENSSL_VERSION: "4.0.0"

permissions:
  contents: read
  packages: write

jobs:
  build-alpine:
    name: Build Alpine (主 Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.NGINX_VERSION }}-alpine
            type=raw,value=latest-alpine,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ env.NGINX_VERSION }}-alpine-

      - name: Build and push Alpine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VER_NGINX=${{ env.NGINX_VERSION }}
            VER_OPENSSL=${{ env.OPENSSL_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-other-distros:
    name: Build ${{ matrix.distro }}
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.distro == matrix.distro || inputs.distro == 'all'))
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu
          - debian
          - almalinux
          - amazonlinux
          - fedora
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Dockerfiles
        run: |
          python3 bin/generate-dockerfiles.py || true

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.NGINX_VERSION }}-${{ matrix.distro }}
            type=sha,prefix=${{ env.NGINX_VERSION }}-${{ matrix.distro }}-

      - name: Build and push ${{ matrix.distro }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Dockerfile.${{ matrix.distro }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VER_NGINX=${{ env.NGINX_VERSION }}
            VER_OPENSSL=${{ env.OPENSSL_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 构建成功后汇总通知
  notify:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-alpine, build-other-distros]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Build Summary ==="
          echo "Alpine:         ${{ needs.build-alpine.result }}"
          echo "Other distros:  ${{ needs.build-other-distros.result }}"
          if [[ "${{ needs.build-alpine.result }}" == "failure" ]]; then
            echo "Alpine build FAILED"
            exit 1
          fi
