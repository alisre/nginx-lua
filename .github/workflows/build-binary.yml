name: Build Nginx Binary (Debian amd64)

# 构建 nginx + Lua 支持的二进制包，安装路径 /usr/local/nginx，打包为 tar.gz 可下载
on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx version'
        required: false
        default: '1.30.0'
      openssl_version:
        description: 'OpenSSL version'
        required: false
        default: '4.0.0'
  push:
    tags:
      - 'binary-*'

env:
  NGINX_VERSION: ${{ inputs.nginx_version || '1.30.0' }}
  OPENSSL_VERSION: ${{ inputs.openssl_version || '4.0.0' }}
  IMAGE_NAME: autosre/nginx-lua

permissions:
  contents: write   # 允许上传 release assets

jobs:
  build-debian-binary:
    name: Build nginx ${{ inputs.nginx_version || '1.30.0' }} binary on Debian amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tpl symlink
        # BuildKit cannot COPY directories through symlinks
        run: |
          if [ -L tpl ]; then
            TARGET=$(readlink tpl)
            rm tpl
            cp -r "$TARGET" tpl
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 使用独立的 Dockerfile 构建：在 Debian 上编译，安装到 /usr/local/nginx，打包导出
      - name: Build nginx binary image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/dockerfiles/Dockerfile.debian-binary
          platforms: linux/amd64
          push: false
          load: true
          tags: nginx-binary-export:latest
          build-args: |
            ARCH=amd64
            VER_NGINX=${{ env.NGINX_VERSION }}
            VER_OPENSSL=${{ env.OPENSSL_VERSION }}
          cache-from: type=gha,scope=debian-binary
          cache-to: type=gha,mode=max,scope=debian-binary

      # 从镜像中提取打包好的 tar.gz
      - name: Extract nginx tarball from image
        run: |
          TARBALL="nginx-${{ env.NGINX_VERSION }}-debian-amd64.tar.gz"
          docker create --name nginx-export nginx-binary-export:latest
          docker cp nginx-export:/nginx-export.tar.gz "./${TARBALL}"
          docker rm nginx-export
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          ls -lh "${TARBALL}"
          # 打印内容清单
          tar -tzf "${TARBALL}" | head -40

      # 上传为 Actions Artifact（可在 Actions 页面直接下载，保留 7 天）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-${{ env.NGINX_VERSION }}-debian-amd64
          path: nginx-${{ env.NGINX_VERSION }}-debian-amd64.tar.gz
          retention-days: 7

      # 如果是 tag 触发，同时上传到 GitHub Release
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nginx-${{ env.NGINX_VERSION }}-debian-amd64.tar.gz
